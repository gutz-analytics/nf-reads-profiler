AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS Batch infrastructure for nf-reads-profiler Nextflow pipeline.
  Creates IAM roles, Graviton (ARM64) compute environments, job queue,
  S3 buckets, CloudWatch monitoring, and AWS Budget alerts.

  Bucket ownership:
    WorkDirBucketName  — Nextflow intermediate files; managed by this stack,
                         deleted on teardown (after manual emptying).
    RunsBucketName     — Pre-existing bucket for samplesheets and results;
                         referenced in IAM policies only, NOT created by this stack.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for Batch compute environments (use default VPC or custom)

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Subnets for Batch compute instances. Use public subnets with auto-assign
      public IP, or private subnets with NAT gateway (required for DockerHub pulls).

  WorkDirBucketName:
    Type: String
    Default: gutz-nf-reads-profilers-workdir
    Description: >
      S3 bucket for Nextflow intermediate work files. Managed by this stack —
      deleted when the stack is deleted (after you empty it first).
      A 30-day lifecycle rule is applied automatically.
      If this bucket already exists, import it: see readme for instructions.

  RunsBucketName:
    Type: String
    Default: gutz-nf-reads-profilers-runs
    Description: >
      Pre-existing S3 bucket for samplesheets (input) and pipeline results (output).
      This bucket is NOT created or deleted by this stack — it is only referenced
      in IAM policies so Batch jobs can read/write to it.

  SpotBidPercentage:
    Type: Number
    Default: 70
    MinValue: 1
    MaxValue: 100
    Description: >
      Spot bid as % of on-demand price. Graviton spot prices in us-east-2 rarely
      exceed 35% of on-demand, so 70% provides a comfortable margin.

  MaxvCPUsSpot:
    Type: Number
    Default: 16
    Description: Maximum vCPUs across all spot instances (controls pipeline parallelism)

  MaxvCPUsOnDemand:
    Type: Number
    Default: 8
    Description: Maximum vCPUs for on-demand fallback (cost safety net)

  MonthlyBudgetThreshold:
    Type: Number
    Default: 500
    Description: Monthly AWS spend alert threshold in USD (alerts fire at 80% actual and 100% forecasted)

  BudgetAlertEmail:
    Type: String
    Description: Email address for budget and CloudWatch alarm notifications

  ProjectTag:
    Type: String
    Default: nf-reads-profiler
    Description: Value for Project cost-allocation tag applied to all resources

  EnvironmentTag:
    Type: String
    Default: development
    AllowedValues: [production, staging, development]
    Description: Value for Environment tag applied to all resources

  EcsAmiId:
    Type: AWS::EC2::Image::Id
    Description: >
      ECS-optimized AMI for Batch workers. Must be Amazon Linux 2023 ARM64
      (Graviton). AL2 is avoided because its glibc 2.26 is too old for modern
      Miniconda (needs >=2.28). Look up the current AMI with:
        aws ec2 describe-images --region us-east-2 --owners amazon \
          --filters "Name=name,Values=al2023-ami-ecs-hvm-*-kernel-*-arm64" \
                    "Name=state,Values=available" \
          --query 'Images | sort_by(@,&CreationDate) | [-1].ImageId' --output text

# ---------------------------------------------------------------------------
# S3
# ---------------------------------------------------------------------------
Resources:

  # Work directory: Nextflow intermediate task files.
  # Managed by this stack — deleted when the stack is torn down.
  # Lifecycle rule auto-expires objects after 30 days, keeping costs low
  # and ensuring the bucket is nearly empty by teardown time.
  S3WorkDirBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref WorkDirBucketName
      LifecycleConfiguration:
        Rules:
          - Id: expire-work-files-30-days
            Status: Enabled
            ExpirationInDays: 30
            NoncurrentVersionExpiration:
              NoncurrentDays: 7
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 3
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag

  # Runs bucket (gutz-nf-reads-profilers-runs) is pre-existing and externally managed.
  # It is NOT created by this stack. IAM policies below reference it by name.

# ---------------------------------------------------------------------------
# IAM
# ---------------------------------------------------------------------------

  # Batch service role — allows AWS Batch to call EC2/ECS on your behalf
  BatchServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectTag}-batch-service-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: batch.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBatchServiceRole
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag

  # EC2 instance role — assumed by the ECS agent on each Batch compute instance
  EcsInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectTag}-ecs-instance-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt S3WorkDirBucket.Arn
                  - !Sub "${S3WorkDirBucket.Arn}/*"
                  - !Sub "arn:aws:s3:::${RunsBucketName}"
                  - !Sub "arn:aws:s3:::${RunsBucketName}/*"
                  # Database bucket
                  - "arn:aws:s3:::cjb-gutz-s3-demo"
                  - "arn:aws:s3:::cjb-gutz-s3-demo/*"
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag

  EcsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${ProjectTag}-ecs-instance-profile"
      Roles:
        - !Ref EcsInstanceRole

  # Job role — assumed by containers themselves (ECS task role).
  # Nextflow passes this as jobRoleArn when registering job definitions.
  BatchJobRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectTag}-batch-job-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !GetAtt S3WorkDirBucket.Arn
                  - !Sub "${S3WorkDirBucket.Arn}/*"
                  - !Sub "arn:aws:s3:::${RunsBucketName}"
                  - !Sub "arn:aws:s3:::${RunsBucketName}/*"
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/batch/*"
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag

  # Spot fleet role — required for SPOT allocation strategy
  SpotFleetRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectTag}-spot-fleet-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: spotfleet.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2SpotFleetTaggingRole
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag

  # Managed policy to attach to the EC2 Nextflow runner's existing IAM role.
  # After deploying: aws iam attach-role-policy --policy-arn <NextflowRunnerPolicyArn output>
  NextflowRunnerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${ProjectTag}-nextflow-runner-policy"
      Description: "Grants an EC2 Nextflow runner VM the minimum permissions to submit and monitor AWS Batch jobs and read/write both S3 buckets."
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: BatchSubmitAndMonitor
            Effect: Allow
            Action:
              - batch:SubmitJob
              - batch:DescribeJobs
              - batch:CancelJob
              - batch:TerminateJob
              - batch:ListJobs
              - batch:RegisterJobDefinition
              - batch:DeregisterJobDefinition
              - batch:DescribeJobDefinitions
              - batch:DescribeJobQueues
              - batch:DescribeComputeEnvironments
            Resource: '*'
          - Sid: S3Access
            Effect: Allow
            Action: s3:*
            Resource:
              - !GetAtt S3WorkDirBucket.Arn
              - !Sub "${S3WorkDirBucket.Arn}/*"
              - !Sub "arn:aws:s3:::${RunsBucketName}"
              - !Sub "arn:aws:s3:::${RunsBucketName}/*"
          - Sid: CloudWatchLogs
            Effect: Allow
            Action:
              - logs:GetLogEvents
              - logs:DescribeLogStreams
              - logs:DescribeLogGroups
            Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/batch/*"
          - Sid: PassJobRole
            Effect: Allow
            Action: iam:PassRole
            Resource: !GetAtt BatchJobRole.Arn
            Condition:
              StringEquals:
                iam:PassedToService: ecs-tasks.amazonaws.com
          - Sid: PassLambdaRole
            Effect: Allow
            Action: iam:PassRole
            Resource: !GetAtt BatchMetricsLambdaRole.Arn
            Condition:
              StringEquals:
                iam:PassedToService: lambda.amazonaws.com
          - Sid: LambdaDeploy
            Effect: Allow
            Action:
              - lambda:CreateFunction
              - lambda:GetFunction
              - lambda:UpdateFunctionCode
              - lambda:UpdateFunctionConfiguration
              - lambda:DeleteFunction
              - lambda:AddPermission
              - lambda:RemovePermission
              - lambda:GetPolicy
              - lambda:ListTags
              - lambda:TagResource
              - lambda:UntagResource
            Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${ProjectTag}-*"
          - Sid: EventBridgeDeploy
            Effect: Allow
            Action:
              - events:PutRule
              - events:DescribeRule
              - events:DeleteRule
              - events:PutTargets
              - events:RemoveTargets
              - events:ListTargetsByRule
            Resource: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:rule/${ProjectTag}-*"

# ---------------------------------------------------------------------------
# Networking
# ---------------------------------------------------------------------------

  BatchComputeSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${ProjectTag}-batch-compute-sg"
      GroupDescription: "Security group for AWS Batch compute instances - no inbound required, instances pull containers and data from S3 outbound."
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
          Description: All outbound (DockerHub pulls, S3, AWS APIs)
      Tags:
        - Key: Name
          Value: !Sub "${ProjectTag}-batch-compute-sg"
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag

# ---------------------------------------------------------------------------
# Launch Template — installs AWS CLI via Miniconda on every worker node at boot
# ---------------------------------------------------------------------------
# Nextflow mounts the GRANDPARENT directory of aws.batch.cliPath from the host
# into each Batch container at the same path. For cliPath '/opt/conda-aws/bin/aws'
# that means /opt/conda-aws/ is bind-mounted in. The install therefore needs to
# be fully self-contained under that directory (binary + Python interpreter +
# site-packages + shared libs), which is exactly what a Miniconda install gives.
#
# /opt/conda-aws was chosen because it does not exist in any of the pipeline's
# container images (multiqc, humann, metaphlan, fastp, sra-tools). Mounting a
# host dir with the same path as a container dir *shadows* the container's
# version — see the Seqera docs warning — so we pick a path that is guaranteed
# not to collide.

  BatchWorkerLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${ProjectTag}-worker"
      LaunchTemplateData:
        ImageId: !Ref EcsAmiId
        # 500 GB gp3 root volume. AL2023 ECS-optimized defaults to 30 GB, which
        # is exhausted by fasterq-dump scratch + pigz output on medium SRA runs.
        # Volume is deleted on instance termination; cost is ~$0.055/hr while
        # a worker is running, $0 once the fleet scales to zero.
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 500
              VolumeType: gp3
              DeleteOnTermination: true
              Encrypted: true
        UserData:
          Fn::Base64: |
            MIME-Version: 1.0
            Content-Type: multipart/mixed; boundary="==BOUNDARY=="

            --==BOUNDARY==
            Content-Type: text/x-shellscript; charset="us-ascii"

            #!/bin/bash
            # Log everything to /var/log/nf-userdata.log for SSH-based debugging.
            exec > >(tee -a /var/log/nf-userdata.log) 2>&1
            set -x
            echo "=== nf-reads-profiler user data starting at $(date) ==="

            ARCH=$(uname -m)
            if [ "$ARCH" = "aarch64" ]; then
              URL="https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-aarch64.sh"
            else
              URL="https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh"
            fi

            curl -fsSL "$URL" -o /tmp/miniconda.sh
            bash /tmp/miniconda.sh -b -f -p /opt/conda-aws
            rm /tmp/miniconda.sh
            /opt/conda-aws/bin/conda install -c conda-forge --override-channels -y awscli
            /opt/conda-aws/bin/aws --version

            # stage dbs locally
            mkdir -p /mnt/dbs
          
            # Sync everything EXCEPT referencedata (MEDI)
            /opt/conda-aws/bin/aws s3 sync s3://cjb-gutz-s3-demo /mnt/dbs/ \
                --exclude "referencedata/*" --quiet
          
            # Restart ECS so the agent sees the populated directory before accepting tasks
            systemctl restart ecs

            echo "=== nf-reads-profiler user data done at $(date) ==="

            --==BOUNDARY==--

# ---------------------------------------------------------------------------
# Compute Environments — Graviton (ARM64) only
# ---------------------------------------------------------------------------
# All containers in this pipeline publish multi-arch images (linux/arm64 + amd64).
# Graviton instances provide 20-40% better price/performance than x86 equivalents.
# AWS Batch automatically selects the ARM64 ECS-optimized AMI when ARM instance
# types are specified.
#
# Resource fits against aws_batch.config limits (cpus: 8, memory: 64 GB):
#   r8g.2xlarge  = 8 vCPU / 64 GB  ← HUMAnN (memory-bound), exact fit
#   r8g.4xlarge  = 16 vCPU / 128 GB ← two HUMAnN jobs in parallel
#   m8g.2xlarge  = 8 vCPU / 32 GB  ← MetaPhlAn, fastp, SRA download
#   c8g.2xlarge  = 8 vCPU / 16 GB  ← MetaPhlAn (CPU-bound alignment)

  # Primary: spot instances. SPOT_CAPACITY_OPTIMIZED selects the pool with the
  # deepest available capacity, minimizing interruptions for long HUMAnN jobs.
  # Includes Graviton 2/3/4 to maximize spot pool diversity and availability.
  SpotComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      State: ENABLED
      ComputeResources:
        Type: SPOT
        AllocationStrategy: SPOT_CAPACITY_OPTIMIZED
        BidPercentage: !Ref SpotBidPercentage
        MinvCpus: 0
        MaxvCpus: !Ref MaxvCPUsSpot
        InstanceRole: !GetAtt EcsInstanceProfile.Arn
        SpotIamFleetRole: !GetAtt SpotFleetRole.Arn
        InstanceTypes:
          # Graviton 4 (r8g) — memory-optimized, best price/perf for HUMAnN
          - r8g.2xlarge    # 8 vCPU / 64 GB
          - r8g.4xlarge    # 16 vCPU / 128 GB
          # Graviton 4 (m8g) — general purpose for MetaPhlAn, fastp, downloads
          - m8g.2xlarge    # 8 vCPU / 32 GB
          - m8g.4xlarge    # 16 vCPU / 64 GB
          # Graviton 4 (c8g) — compute-optimized for CPU-bound alignment
          - c8g.2xlarge    # 8 vCPU / 16 GB
          # Graviton 3 — fallback when G4 spot pools are exhausted
          - r7g.2xlarge    # 8 vCPU / 64 GB
          - r7g.4xlarge    # 16 vCPU / 128 GB
          - m7g.2xlarge    # 8 vCPU / 32 GB
          - c7g.2xlarge    # 8 vCPU / 16 GB
          # Graviton 2 — older but widely available, lowest spot prices
          - r6g.2xlarge    # 8 vCPU / 64 GB
          - m6g.2xlarge    # 8 vCPU / 32 GB
        LaunchTemplate:
          LaunchTemplateId: !Ref BatchWorkerLaunchTemplate
          Version: $Latest
        Subnets: !Ref SubnetIds
        SecurityGroupIds:
          - !Ref BatchComputeSG
        Tags:
          Project: !Ref ProjectTag
          Environment: !Ref EnvironmentTag
      Tags:
        Project: !Ref ProjectTag
        Environment: !Ref EnvironmentTag

  # Fallback: on-demand Graviton instances — used when spot capacity unavailable.
  # Capped at MaxvCPUsOnDemand (default 64) as a cost safety net.
  OnDemandComputeEnvironment:
    Type: AWS::Batch::ComputeEnvironment
    Properties:
      Type: MANAGED
      State: ENABLED
      ComputeResources:
        Type: EC2
        AllocationStrategy: BEST_FIT_PROGRESSIVE
        MinvCpus: 0
        MaxvCpus: !Ref MaxvCPUsOnDemand
        InstanceRole: !GetAtt EcsInstanceProfile.Arn
        InstanceTypes:
          - r8g.2xlarge
          - r8g.4xlarge
          - m8g.2xlarge
          - m8g.4xlarge
          - r7g.2xlarge
        LaunchTemplate:
          LaunchTemplateId: !Ref BatchWorkerLaunchTemplate
          Version: $Latest
        Subnets: !Ref SubnetIds
        SecurityGroupIds:
          - !Ref BatchComputeSG
        Tags:
          Project: !Ref ProjectTag
          Environment: !Ref EnvironmentTag
      Tags:
        Project: !Ref ProjectTag
        Environment: !Ref EnvironmentTag

# ---------------------------------------------------------------------------
# Job Queue
# ---------------------------------------------------------------------------

  # Named exactly "spot-queue" to match conf/aws_batch.config — no config changes needed.
  # Spot CE has priority 1 (tried first); on-demand CE has priority 2 (transparent fallback).
  SpotQueue:
    Type: AWS::Batch::JobQueue
    Properties:
      JobQueueName: spot-queue
      State: ENABLED
      Priority: 100
      ComputeEnvironmentOrder:
        - Order: 1
          ComputeEnvironment: !Ref SpotComputeEnvironment
        - Order: 2
          ComputeEnvironment: !Ref OnDemandComputeEnvironment
      Tags:
        Project: !Ref ProjectTag
        Environment: !Ref EnvironmentTag

# ---------------------------------------------------------------------------
# CloudWatch Logs
# ---------------------------------------------------------------------------

  BatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/batch/nf-reads-profiler
      RetentionInDays: 30
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag

# ---------------------------------------------------------------------------
# SNS — alarm and budget notifications
# ---------------------------------------------------------------------------

  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectTag}-alerts"
      Subscription:
        - Protocol: email
          Endpoint: !Ref BudgetAlertEmail
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag

# ---------------------------------------------------------------------------
# CloudWatch Alarms
# ---------------------------------------------------------------------------

  # Fires when 5+ jobs fail within 5 minutes — indicates a systemic issue
  # (bad container image, IAM permission error, etc.) vs. normal spot interruptions
  # which are handled transparently by maxRetries=3 in aws_batch.config.
  FailedJobsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectTag}-batch-failed-jobs"
      AlarmDescription: "5+ Batch jobs failed in 5 minutes on spot-queue. Likely a systemic issue rather than spot interruptions (those are retried automatically)."
      Namespace: AWS/Batch
      MetricName: FailedJobCount
      Dimensions:
        - Name: JobQueue
          Value: !GetAtt SpotQueue.JobQueueArn
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic
      OKActions:
        - !Ref AlarmTopic
    DependsOn: SpotQueue

  # Fires when many jobs are stuck pending — indicates spot capacity shortage
  # causing the fallback on-demand CE to also be exhausted or maxvCPU-limited.
  PendingJobsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectTag}-batch-high-pending"
      AlarmDescription: "50+ jobs pending on spot-queue for 15+ minutes. Spot capacity may be exhausted and on-demand vCPU limit reached. Consider raising MaxvCPUsOnDemand."
      Namespace: AWS/Batch
      MetricName: PendingJobCount
      Dimensions:
        - Name: JobQueue
          Value: !GetAtt SpotQueue.JobQueueArn
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 3
      Threshold: 50
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlarmTopic
    DependsOn: SpotQueue

# ---------------------------------------------------------------------------
# Batch Job Metrics — EventBridge → Lambda → CloudWatch
# Publishes SucceededJobCount, FailedJobCount, etc. to AWS/Batch namespace.
# AWS Batch does not emit these metrics automatically; this is the back-end
# that feeds the dashboard below.
# ---------------------------------------------------------------------------

  BatchMetricsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectTag}-batch-metrics-lambda-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PutBatchMetrics
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: '*'
                Condition:
                  StringEquals:
                    cloudwatch:namespace: AWS/Batch
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag

  BatchMetricsFunction:
    Type: AWS::Lambda::Function
    DependsOn: NextflowRunnerPolicy
    Properties:
      FunctionName: !Sub "${ProjectTag}-batch-metrics"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt BatchMetricsLambdaRole.Arn
      Timeout: 10
      Code:
        ZipFile: |
          import boto3

          cw = boto3.client('cloudwatch')

          METRIC_MAP = {
              'SUBMITTED': 'SubmittedJobCount',
              'PENDING':   'PendingJobCount',
              'RUNNABLE':  'RunnableJobCount',
              'STARTING':  'StartingJobCount',
              'RUNNING':   'RunningJobCount',
              'SUCCEEDED': 'SucceededJobCount',
              'FAILED':    'FailedJobCount',
          }

          def handler(event, context):
              detail = event.get('detail', {})
              status = detail.get('status')
              job_queue = detail.get('jobQueue')  # full ARN from Batch events
              metric = METRIC_MAP.get(status)
              if not metric or not job_queue:
                  return
              cw.put_metric_data(
                  Namespace='AWS/Batch',
                  MetricData=[{
                      'MetricName': metric,
                      'Dimensions': [{'Name': 'JobQueue', 'Value': job_queue}],
                      'Value': 1,
                      'Unit': 'Count',
                  }]
              )
      Tags:
        - Key: Project
          Value: !Ref ProjectTag
        - Key: Environment
          Value: !Ref EnvironmentTag

  BatchJobStateRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${ProjectTag}-batch-job-state-change"
      Description: "Capture Batch job state changes and publish counts to CloudWatch AWS/Batch namespace"
      EventPattern:
        source:
          - aws.batch
        detail-type:
          - Batch Job State Change
      State: ENABLED
      Targets:
        - Id: BatchMetricsLambda
          Arn: !GetAtt BatchMetricsFunction.Arn

  BatchMetricsLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt BatchMetricsFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt BatchJobStateRule.Arn

# ---------------------------------------------------------------------------
# CloudWatch Dashboard
# ---------------------------------------------------------------------------

  BatchDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${ProjectTag}-batch"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Job Status — spot-queue",
                "metrics": [
                  ["AWS/Batch", "SucceededJobCount", "JobQueue", "${SpotQueue.JobQueueArn}", {"color": "#2ca02c", "label": "Succeeded"}],
                  ["AWS/Batch", "FailedJobCount",    "JobQueue", "${SpotQueue.JobQueueArn}", {"color": "#d62728", "label": "Failed"}],
                  ["AWS/Batch", "PendingJobCount",   "JobQueue", "${SpotQueue.JobQueueArn}", {"color": "#ff7f0e", "label": "Pending"}],
                  ["AWS/Batch", "RunnableJobCount",  "JobQueue", "${SpotQueue.JobQueueArn}", {"color": "#1f77b4", "label": "Runnable"}],
                  ["AWS/Batch", "StartingJobCount",  "JobQueue", "${SpotQueue.JobQueueArn}", {"color": "#9467bd", "label": "Starting"}],
                  ["AWS/Batch", "RunningJobCount",   "JobQueue", "${SpotQueue.JobQueueArn}", {"color": "#17becf", "label": "Running"}]
                ],
                "period": 300,
                "stat": "Sum",
                "view": "timeSeries",
                "region": "${AWS::Region}"
              }
            },
            {
              "type": "alarm",
              "x": 0, "y": 6, "width": 6, "height": 3,
              "properties": {
                "title": "Active Alarms",
                "alarms": [
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${ProjectTag}-batch-failed-jobs",
                  "arn:aws:cloudwatch:${AWS::Region}:${AWS::AccountId}:alarm:${ProjectTag}-batch-high-pending"
                ]
              }
            },
            {
              "type": "metric",
              "x": 6, "y": 6, "width": 18, "height": 6,
              "properties": {
                "title": "Job Failure Rate (Failed / Submitted)",
                "metrics": [
                  ["AWS/Batch", "FailedJobCount",    "JobQueue", "${SpotQueue.JobQueueArn}"],
                  ["AWS/Batch", "SucceededJobCount", "JobQueue", "${SpotQueue.JobQueueArn}"]
                ],
                "period": 3600,
                "stat": "Sum",
                "view": "timeSeries",
                "region": "${AWS::Region}"
              }
            }
          ]
        }
    DependsOn:
      - FailedJobsAlarm
      - PendingJobsAlarm

# ---------------------------------------------------------------------------
# AWS Budget
# ---------------------------------------------------------------------------

  BatchMonthlyBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub "${ProjectTag}-monthly"
        BudgetType: COST
        TimeUnit: MONTHLY
        BudgetLimit:
          Amount: !Ref MonthlyBudgetThreshold
          Unit: USD
        CostFilters:
          TagKeyValue:
            - !Sub "user:Project$${ProjectTag}"
        CostTypes:
          IncludeTax: true
          IncludeSubscription: true
          UseBlended: false
      NotificationsWithSubscribers:
        - Notification:
            NotificationType: ACTUAL
            ComparisonOperator: GREATER_THAN
            Threshold: 80
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetAlertEmail
        - Notification:
            NotificationType: FORECASTED
            ComparisonOperator: GREATER_THAN
            Threshold: 100
            ThresholdType: PERCENTAGE
          Subscribers:
            - SubscriptionType: EMAIL
              Address: !Ref BudgetAlertEmail

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------

Outputs:
  SpotQueueArn:
    Description: ARN of the spot-queue job queue (referenced by Nextflow aws_batch.config)
    Value: !GetAtt SpotQueue.JobQueueArn
    Export:
      Name: !Sub "${AWS::StackName}-SpotQueueArn"

  BatchJobRoleArn:
    Description: >
      ARN of the ECS task role for Batch jobs. Add to conf/aws_batch.config:
      aws { batch { jobRole = '<this value>' } }
    Value: !GetAtt BatchJobRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-BatchJobRoleArn"

  NextflowRunnerPolicyArn:
    Description: >
      Attach this managed policy to the IAM role of your EC2 Nextflow runner VM.
      Command: aws iam attach-role-policy --role-name <runner-role> --policy-arn <this-value>
    Value: !Ref NextflowRunnerPolicy
    Export:
      Name: !Sub "${AWS::StackName}-NextflowRunnerPolicyArn"

  WorkDirBucket:
    Description: S3 bucket for Nextflow work directory (set as workDir in aws_batch.config)
    Value: !Ref S3WorkDirBucket
    Export:
      Name: !Sub "${AWS::StackName}-WorkDirBucket"

  DashboardUrl:
    Description: CloudWatch dashboard for monitoring Batch jobs and vCPU utilization
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${ProjectTag}-batch"

  BatchConsoleUrl:
    Description: AWS Batch console — view job queues, compute environments, and running jobs
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/batch/home?region=${AWS::Region}#/queues"

  LogGroupName:
    Description: CloudWatch log group for all Batch job logs
    Value: /aws/batch/nf-reads-profiler
